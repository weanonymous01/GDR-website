<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GDR Hospital — World-class healthcare with compassion. Book a call with our specialists today.">
  <title>GDR Hospital | Compassionate World-Class Healthcare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav id="navbar" class="navbar">
    <div class="nav-inner">
      <a href="#" class="nav-logo" id="nav-logo">
        <span class="logo-text">GDR <span class="logo-highlight">Hospital</span></span>
      </a>
      <ul class="nav-links" id="nav-links">
        <li><a href="#home" class="nav-link active">Home</a></li>
        <li><a href="#about" class="nav-link">About</a></li>
        <li><a href="#services" class="nav-link">Services</a></li>
        <li><a href="#doctors" class="nav-link">Doctors</a></li>
        <li><a href="#contact" class="nav-link">Contact</a></li>
      </ul>
      <a href="#book" class="nav-cta" id="nav-cta-btn">Book a Call</a>
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Toggle navigation menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- ===== HERO / VIDEO SECTION ===== -->
  <section id="home" class="hero">
    <div class="hero-video-wrapper">
      <video class="hero-video" autoplay muted loop playsinline id="hero-video">
        <source src="grd-website-vid.mp4" type="video/mp4">
      </video>
      <div class="hero-overlay"></div>
    </div>

    <div class="hero-content" id="hero-content">
      <p class="hero-subtitle">Your Trusted Healthcare Partner</p>
      <p class="hero-tagline">Advanced Medical Care | 24/7 Emergency Services</p>
    </div>

    <!-- Bottom section: buttons + stats above scroll indicator -->
    <div class="hero-bottom" id="hero-bottom">
      <div class="hero-actions">
        <a href="#book" class="btn-book-call" id="hero-book-call-btn">
          <span class="btn-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
          </span>
          Book a Call
          <span class="btn-shimmer"></span>
        </a>
        <a href="#services" class="btn-explore" id="hero-explore-btn">
          Explore Services
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </a>
      </div>

      <div class="hero-stats">
        <div class="stat-item" id="stat-doctors">
          <span class="stat-label">Expert Doctors</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item" id="stat-departments">
          <span class="stat-label">Departments</span>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item" id="stat-experience">
          <span class="stat-label">Years Experience</span>
        </div>
      </div>
    </div>

    <!-- Scroll indicator -->
    <div class="scroll-indicator" id="scroll-indicator">
      <div class="scroll-mouse">
        <div class="scroll-wheel"></div>
      </div>
      <span>Scroll Down</span>
    </div>
  </section>

  <!-- ===== NEW SECTIONS WILL GO HERE ===== -->

  <script src="script.js"></script>
</body>
</html>
